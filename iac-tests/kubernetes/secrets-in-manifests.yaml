# =============================================================================
# IaC Test: Kubernetes manifests with hardcoded secrets
# Expected: CONFIG / UNKNOWN / CRITICAL
# =============================================================================
# Patterns tested:
#   hardcoded-secret    → CRITICAL
#   cloud_access_key    → CRITICAL (BUG 7: should be SECRET not CONFIG)
#   cloud_secret_key    → CRITICAL (BUG 7: should be SECRET not CONFIG)
#   generic_secret      → CRITICAL
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: secrets-everywhere
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leaky
  template:
    metadata:
      labels:
        app: leaky
    spec:
      containers:
      - name: app
        image: myapp:v1.0.0
        env:
        # ─────────────────────────────────────────────────────
        # ISSUE: AWS credentials in YAML
        # Rule: kubernetes.security.hardcoded-secret
        # Expected severity: CRITICAL
        # ─────────────────────────────────────────────────────
        - name: AWS_ACCESS_KEY_ID
          value: "AKIAIOSFODNN7EXAMPLE"
        - name: AWS_SECRET_ACCESS_KEY
          value: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"

        # ─────────────────────────────────────────────────────
        # ISSUE: Database credentials in YAML
        # ─────────────────────────────────────────────────────
        - name: DATABASE_URL
          value: "postgresql://admin:Super$ecret!@prod-db.internal:5432/app"
        - name: REDIS_URL
          value: "redis://:redis-pass-123@redis.internal:6379/0"

        # ─────────────────────────────────────────────────────
        # ISSUE: API keys and tokens
        # ─────────────────────────────────────────────────────
        - name: STRIPE_SECRET_KEY
          value: "sk_live_4eC39HqLyjWDarjtT1zdp7dc"
        - name: SENDGRID_API_KEY
          value: "SG.xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
        - name: GITHUB_TOKEN
          value: "ghp_ABCDEFghijklmnopqrstuvwxyz1234567890"
        - name: SLACK_WEBHOOK_URL
          value: "https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX"

        # ─────────────────────────────────────────────────────
        # ISSUE: JWT signing key
        # ─────────────────────────────────────────────────────
        - name: JWT_SECRET
          value: "my-256-bit-secret-that-should-be-in-vault"
        - name: ENCRYPTION_KEY
          value: "0123456789abcdef0123456789abcdef"

---
# ISSUE: Secret resource with base64-encoded values
# These are trivially decodable — not encryption
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: production
type: Opaque
data:
  # echo -n 'admin' | base64
  username: YWRtaW4=
  # echo -n 'S3cur3P@ssw0rd!' | base64
  password: UzNjdXIzUEBzc3cwcmQh
  # echo -n 'AKIAIOSFODNN7EXAMPLE' | base64
  aws-access-key: QUtJQUlPU0ZPRE5ON0VYQU1QTEU=
  # echo -n 'wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY' | base64
  aws-secret-key: d0phbHJYVXRuRkVNSS9LN01ERU5HL2JQeFJmaUNZRVhBTVBMRUtFWQ==

---
# ConfigMap with secrets (wrong resource type)
apiVersion: v1
kind: ConfigMap
metadata:
  name: not-really-config
  namespace: production
data:
  # ISSUE: Secrets stored in ConfigMap instead of Secret
  database.properties: |
    db.host=prod-db.internal
    db.port=5432
    db.username=admin
    db.password=ProductionPassword123!
    db.ssl.keystore.password=keystorePass456
  api-keys.json: |
    {
      "openai_api_key": "sk-proj-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx",
      "anthropic_api_key": "sk-ant-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx",
      "datadog_api_key": "0123456789abcdef0123456789abcdef"
    }

# REACHABLE Validation Suite
#
# Runs REACHABLE on each test case and validates output matches expected results

name: Validate REACHABLE

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC

jobs:
  validate:
    name: Validate ${{ matrix.testcase }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testcase:
          - python-app
          - javascript-app
          - go-app
          - java-maven

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install REACHABLE
        run: pip install reachable

      - name: Install scanners
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Setup test case
        run: |
          cd ${{ matrix.testcase }}
          
          # Install dependencies for language-specific setup
          case "${{ matrix.testcase }}" in
            python-app)
              pip install -r requirements.txt || true
              ;;
            javascript-app)
              npm install --ignore-scripts || true
              ;;
            java-maven)
              # Maven will download deps during scan
              ;;
            go-app)
              go mod download || true
              ;;
          esac

      - name: Run REACHABLE scan
        run: |
          mkdir -p results/${{ matrix.testcase }}
          reachctl scan ${{ matrix.testcase }}/ \
            --output results/${{ matrix.testcase }} \
            --json

      - name: Validate results
        run: |
          python validate.py \
            results/${{ matrix.testcase }}/reachable-report.json \
            expected-results/${{ matrix.testcase }}.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.testcase }}
          path: results/${{ matrix.testcase }}/

  summary:
    name: Validation Summary
    needs: validate
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check results
        run: |
          echo "## Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Case | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          
          # This would need job output parsing in real implementation
          echo "See individual job results above." >> $GITHUB_STEP_SUMMARY
